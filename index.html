<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLINK ARCHER: OVERDRIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00c8;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden; touch-action: none;
            color: white;
        }

        .font-arcade { font-family: 'Russo One', sans-serif; text-transform: uppercase; }

        #container {
            position: relative; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            background: #000; overflow: hidden;
        }

        video, #game-canvas {
            position: absolute; top: 0; left: 0;
            width: 100% !important; height: 100% !important;
            transform: scaleX(-1); object-fit: cover;
        }

        /* UI Overlays */
        .ui-screen {
            position: absolute; inset: 0; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(0px);
        }

        .ui-screen.hidden {
            opacity: 0; pointer-events: none; transform: scale(1.1);
            backdrop-filter: blur(0px);
        }

        .ui-screen.visible {
            opacity: 1; pointer-events: auto; transform: scale(1);
            backdrop-filter: blur(15px);
        }

        /* Glassmorphism */
        .glass {
            background: rgba(15, 15, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-radius: 2rem;
        }

        .neon-border-cyan { border: 1px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .neon-text-cyan { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        .neon-text-pink { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        /* Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.05), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none; z-index: 5;
        }

        @keyframes pulse-vignette {
            0%, 100% { box-shadow: inset 0 0 100px rgba(0,0,0,0.9); }
            50% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.3); }
        }
        .critical-vignette {
            position: absolute; inset: 0; z-index: 40;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
            animation: pulse-vignette 1s infinite;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: black; font-weight: 900;
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        .btn-premium:active { transform: translateY(1px) scale(0.98); }

        /* HUD Components */
        .hud-element {
            pointer-events: none;
            position: absolute;
            z-index: 30;
        }

        .timer-ring {
            width: 80px; height: 80px;
            transform: rotate(-90deg);
        }

        .score-counter {
            font-variant-numeric: tabular-nums;
        }

        .combo-meter-container {
            width: 120px; height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px; overflow: hidden;
            margin-top: 5px;
        }
        
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="game-canvas"></canvas>
    <div class="scanline"></div>
    <div id="critical-vignette" class="critical-vignette"></div>

    <!-- START SCREEN -->
    <div id="start-screen" class="ui-screen visible">
        <div class="glass p-10 flex flex-col items-center w-[360px] max-w-[90vw] neon-border-cyan">
            <div class="text-[10px] tracking-[0.5em] text-cyan-400 font-bold mb-2 uppercase">Neural Link Established</div>
            <h1 class="font-arcade text-4xl mb-6 italic tracking-tighter text-center">Blink Archer<br><span class="text-pink-500">Overdrive</span></h1>
            
            <div class="w-full space-y-4 mb-8">
                <div class="space-y-2">
                    <label class="text-[9px] uppercase font-bold text-white/40 tracking-widest block text-center">Simulation Depth</label>
                    <div class="flex gap-2" id="time-selector">
                        <button class="flex-1 py-2 glass text-xs font-arcade active neon-border-cyan" data-val="15">15s</button>
                        <button class="flex-1 py-2 glass text-xs font-arcade" data-val="30">30s</button>
                        <button class="flex-1 py-2 glass text-xs font-arcade" data-val="60">60s</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] uppercase font-bold text-white/40 tracking-widest block text-center">Arsenal</label>
                    <div class="flex gap-2" id="arrow-selector">
                        <button class="flex-1 py-2 glass text-xs font-arcade" data-val="5">05</button>
                        <button class="flex-1 py-2 glass text-xs font-arcade active neon-border-cyan" data-val="10">10</button>
                        <button class="flex-1 py-2 glass text-xs font-arcade" data-val="20">20</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] uppercase font-bold text-white/40 tracking-widest block text-center">Target Skin</label>
                    <div class="flex gap-2" id="skin-selector">
                        <button class="flex-1 py-2 glass text-xs font-arcade active neon-border-cyan" data-val="standard">CORE</button>
                        <button class="flex-1 py-2 glass text-xs font-arcade" data-val="bird">AVIS</button>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="btn-premium w-full py-5 rounded-2xl font-arcade text-xl tracking-tight disabled:opacity-30" disabled>
                INITIALIZE CORE
            </button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hud-element inset-0 opacity-0 transition-opacity duration-500">
        <!-- Top Stats -->
        <div class="absolute top-10 left-10 flex items-start gap-6">
            <div class="glass p-4 min-w-[140px] border-l-4 border-l-cyan-400">
                <div class="text-[9px] font-bold text-cyan-400 tracking-widest uppercase mb-1">Neural Score</div>
                <div id="score-text" class="font-arcade text-4xl score-counter">0000</div>
                <div class="combo-meter-container">
                    <div id="combo-fill" class="h-full bg-pink-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div class="relative flex items-center justify-center">
                <svg class="timer-ring">
                    <circle cx="40" cy="40" r="35" stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="transparent" />
                    <circle id="timer-progress" cx="40" cy="40" r="35" stroke="var(--neon-cyan)" stroke-width="6" fill="transparent" stroke-dasharray="219.9" stroke-dashoffset="0" stroke-linecap="round" />
                </svg>
                <div id="timer-text" class="absolute font-arcade text-xl">15</div>
            </div>
        </div>

        <!-- Arrows -->
        <div id="arrow-display" class="absolute top-10 right-10 flex gap-2">
            <!-- Dynamic arrows -->
        </div>

        <!-- Blink Indicator -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center">
            <div class="text-[8px] font-black text-cyan-400 tracking-[0.3em] uppercase mb-2">Blink Trigger Status</div>
            <div class="w-48 h-1.5 glass overflow-hidden">
                <div id="blink-progress" class="h-full bg-cyan-400 transition-all duration-75" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="end-screen" class="ui-screen hidden">
        <div class="glass p-10 flex flex-col items-center w-[360px] neon-border-cyan">
            <div id="rank-tag" class="px-4 py-1 bg-pink-600 rounded-full text-[10px] font-bold tracking-widest mb-4">RECRUIT</div>
            <h2 class="text-white/40 text-[10px] uppercase tracking-widest mb-2">Final Neural Output</h2>
            <div id="final-score-text" class="font-arcade text-7xl text-white italic mb-10">0000</div>

            <div class="grid grid-cols-2 gap-4 w-full mb-10">
                <div class="glass p-4 text-center">
                    <div class="text-[8px] text-white/40 uppercase mb-1">Accuracy</div>
                    <div id="accuracy-stat" class="font-arcade text-xl text-cyan-400">0%</div>
                </div>
                <div class="glass p-4 text-center">
                    <div class="text-[8px] text-white/40 uppercase mb-1">Max Combo</div>
                    <div id="combo-stat" class="font-arcade text-xl text-pink-500">x0</div>
                </div>
            </div>

            <button id="restart-btn" class="btn-premium w-full py-4 rounded-xl font-arcade mb-3">SYNCHRONIZE AGAIN</button>
            <button id="menu-btn" class="w-full py-3 glass rounded-xl text-[10px] font-bold tracking-widest uppercase">Return to Hub</button>
        </div>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown" class="ui-screen hidden !bg-transparent">
        <div id="countdown-text" class="font-arcade text-9xl italic text-cyan-400">3</div>
    </div>
</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    // --- GAME CONSTANTS ---
    const COLORS = {
        cyan: '#00f2ff',
        pink: '#ff00c8',
        purple: '#9d00ff',
        green: '#39ff14',
        white: '#ffffff'
    };

    // --- SOUND SYSTEM (Web Audio API) ---
    class AudioManager {
        constructor() {
            this.ctx = null;
            this.masterGain = null;
            this.isMuted = false;
        }

        async init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.connect(this.ctx.destination);
                this.masterGain.gain.value = 0.4;
            }
            if (this.ctx.state === 'suspended') {
                await this.ctx.resume();
            }
            return this.ctx;
        }

        play(type, freq = 440, duration = 0.1, volume = 0.2) {
            if (!this.ctx || this.isMuted) return;
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, now);
            g.gain.setValueAtTime(volume, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + duration);

            osc.connect(g);
            g.connect(this.masterGain);

            osc.start();
            osc.stop(now + duration);
        }

        async shoot() {
            await this.init(); 
            if (!this.ctx || this.isMuted) return;
            const now = this.ctx.currentTime;
            
            const snap = this.ctx.createOscillator();
            const snapGain = this.ctx.createGain();
            snap.type = 'square';
            snap.frequency.setValueAtTime(3200, now);
            snap.frequency.exponentialRampToValueAtTime(1200, now + 0.03);
            snapGain.gain.setValueAtTime(0.25, now);
            snapGain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
            snap.connect(snapGain);
            snapGain.connect(this.masterGain);
            snap.start();
            snap.stop(now + 0.03);

            const thump = this.ctx.createOscillator();
            const thumpGain = this.ctx.createGain();
            thump.type = 'sawtooth';
            thump.frequency.setValueAtTime(1600, now);
            thump.frequency.exponentialRampToValueAtTime(60, now + 0.15);
            thumpGain.gain.setValueAtTime(0.15, now);
            thumpGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            thump.connect(thumpGain);
            thumpGain.connect(this.masterGain);
            thump.start();
            thump.stop(now + 0.15);
        }

        async hit(combo) {
            await this.init();
            const pitch = 600 + (combo * 100);
            this.play('sine', pitch, 0.3, 0.2);
            this.play('triangle', pitch * 1.5, 0.1, 0.1);
        }

        async birdHit() {
            await this.init();
            if (!this.ctx || this.isMuted) return;
            const now = this.ctx.currentTime;
            
            // Refined "Squawk" sound using harmonic oscillators
            const osc1 = this.ctx.createOscillator();
            const osc2 = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(1800, now);
            osc1.frequency.exponentialRampToValueAtTime(800, now + 0.15);

            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(2200, now);
            osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.15);

            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            osc1.connect(g);
            osc2.connect(g);
            g.connect(this.masterGain);

            osc1.start(); osc1.stop(now + 0.15);
            osc2.start(); osc2.stop(now + 0.15);
        }

        async miss() {
            await this.init();
            this.play('sawtooth', 120, 0.4, 0.1);
        }

        async click() {
            await this.init();
            this.play('sine', 1200, 0.05, 0.05);
        }
    }

    const Audio = new AudioManager();

    // --- ENGINE STATE ---
    let faceLandmarker;
    let video = document.getElementById('video');
    let canvas = document.getElementById('game-canvas');
    let ctx = canvas.getContext('2d');
    
    let gameState = {
        mode: 'START',
        score: 0,
        displayScore: 0,
        arrows: 0,
        maxArrows: 10,
        time: 15,
        maxTime: 15,
        targetSkin: 'standard',
        combo: 1,
        maxCombo: 1,
        hits: 0,
        shots: 0,
        lastBlink: 0,
        sensitivity: 0.45,
        lastTimestamp: 0,
        shake: 0
    };

    let crosshair = { x: 0.5, y: 0.5, targetX: 0.5, targetY: 0.5, active: false, trail: [] };
    let target = { x: 0.5, y: 0.5, vx: 0, vy: 0, radius: 40, active: false, pulse: 0, spawnTime: 0 };
    let particles = [];
    let popups = [];

    const lerp = (a, b, n) => (1 - n) * a + n * b;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function mapVideoToScreen(x, y) {
        if (!video.videoWidth) return { x, y };
        const videoAspect = video.videoWidth / video.videoHeight;
        const screenAspect = window.innerWidth / window.innerHeight;
        let mappedX = x;
        let mappedY = y;
        if (videoAspect > screenAspect) {
            const scale = window.innerHeight / video.videoHeight;
            const scaledWidth = video.videoWidth * scale;
            const offset = (scaledWidth - window.innerWidth) / 2;
            mappedX = (x * scaledWidth - offset) / window.innerWidth;
        } else {
            const scale = window.innerWidth / video.videoWidth;
            const scaledHeight = video.videoHeight * scale;
            const offset = (scaledHeight - window.innerHeight) / 2;
            mappedY = (y * scaledHeight - offset) / window.innerHeight;
        }
        return { x: mappedX, y: mappedY };
    }

    function createParticle(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 1.0,
                color,
                size: Math.random() * 5 + 2
            });
        }
    }

    function createPopup(x, y, text, color) {
        popups.push({ x, y, text, color, life: 1.0, vy: -2 });
    }

    async function init() {
        resize();
        window.addEventListener('resize', resize);
        try {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: 640, height: 480 } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                document.getElementById('start-btn').disabled = false;
                document.getElementById('start-btn').innerText = "CONNECT NEURAL LINK";
                requestAnimationFrame(gameLoop);
            };
        } catch (e) {
            console.error(e);
            alert("Camera access is required for AR gameplay.");
        }
    }

    function spawnTarget() {
        target.x = 0.15 + Math.random() * 0.7;
        target.y = 0.2 + Math.random() * 0.5;
        const baseSpeed = 0.00035; 
        const difficulty = 1 + (gameState.score / 80); 
        target.vx = (Math.random() - 0.5) * baseSpeed * difficulty;
        target.vy = (Math.random() - 0.5) * baseSpeed * difficulty;
        target.active = true;
        target.spawnTime = performance.now();
        target.pulse = 0;
    }

    function fire() {
        if (gameState.mode !== 'PLAYING' || gameState.arrows <= 0) return;
        gameState.shots++;
        gameState.arrows--;
        Audio.shoot();
        const aspect = window.innerWidth / window.innerHeight;
        const dx = (crosshair.x - target.x) * aspect;
        const dy = (crosshair.y - target.y);
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hitLimit = 0.08;
        if (dist < hitLimit) {
            gameState.hits++;
            const points = 10 * gameState.combo;
            gameState.score += points;
            gameState.combo++;
            if(gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
            
            if (gameState.targetSkin === 'bird') {
                Audio.birdHit();
                createParticle(target.x, target.y, '#FFD700');
            } else {
                Audio.hit(gameState.combo);
                createParticle(target.x, target.y, COLORS.cyan);
            }
            createPopup(target.x, target.y, `+${points}`, COLORS.cyan);
            gameState.shake = 10;
            spawnTarget();
        } else {
            gameState.combo = 1;
            Audio.miss();
            createParticle(crosshair.x, crosshair.y, COLORS.pink);
            createPopup(crosshair.x, crosshair.y, `MISS`, COLORS.pink);
        }
        updateHUD();
        if (gameState.arrows === 0) setTimeout(endGame, 800);
    }

    function updateHUD() {
        const container = document.getElementById('arrow-display');
        container.innerHTML = '';
        for(let i=0; i<gameState.maxArrows; i++) {
            const active = i < gameState.arrows;
            container.innerHTML += `
                <div class="w-2 h-8 rounded-full transition-all duration-300 ${active ? 'bg-cyan-400 shadow-[0_0_10px_cyan]' : 'bg-white/10'}" 
                     style="transform: skewX(-15deg) ${!active ? 'scale(0.8)' : ''}"></div>
            `;
        }
    }

    async function startSequence() {
        await Audio.init();
        document.getElementById('start-screen').classList.replace('visible', 'hidden');
        document.getElementById('countdown').classList.remove('hidden');
        let count = 3;
        const cdText = document.getElementById('countdown-text');
        const timer = setInterval(async () => {
            count--;
            await Audio.click();
            if(count === 0) {
                cdText.innerText = "GO!";
                cdText.classList.add('neon-text-pink');
            } else if (count < 0) {
                clearInterval(timer);
                document.getElementById('countdown').classList.add('hidden');
                startGame();
            } else {
                cdText.innerText = count;
            }
        }, 800);
    }

    function startGame() {
        gameState.mode = 'PLAYING';
        gameState.score = 0;
        gameState.displayScore = 0;
        gameState.hits = 0;
        gameState.shots = 0;
        gameState.combo = 1;
        gameState.maxCombo = 1;
        gameState.maxTime = parseInt(document.querySelector('#time-selector .active').dataset.val);
        gameState.time = gameState.maxTime;
        gameState.maxArrows = parseInt(document.querySelector('#arrow-selector .active').dataset.val);
        gameState.arrows = gameState.maxArrows;
        gameState.targetSkin = document.querySelector('#skin-selector .active').dataset.val;
        
        document.getElementById('hud').style.opacity = '1';
        spawnTarget();
        updateHUD();
    }

    function endGame() {
        if (gameState.mode === 'END') return;
        gameState.mode = 'END';
        document.getElementById('hud').style.opacity = '0';
        document.getElementById('end-screen').classList.replace('hidden', 'visible');
        document.getElementById('final-score-text').innerText = gameState.score.toString().padStart(4, '0');
        const accuracy = gameState.shots > 0 ? Math.round((gameState.hits / gameState.shots) * 100) : 0;
        document.getElementById('accuracy-stat').innerText = accuracy + "%";
        document.getElementById('combo-stat').innerText = "x" + gameState.maxCombo;
        const rank = gameState.score > 200 ? 'GHOST' : gameState.score > 100 ? 'ELITE' : 'RECRUIT';
        document.getElementById('rank-tag').innerText = rank;
    }

    function gameLoop(now) {
        const delta = now - gameState.lastTimestamp;
        gameState.lastTimestamp = now;
        if (faceLandmarker && video.currentTime !== gameState.lastVideoTime) {
            gameState.lastVideoTime = video.currentTime;
            const result = faceLandmarker.detectForVideo(video, now);
            if (result.faceLandmarks && result.faceLandmarks[0]) {
                const nose = result.faceLandmarks[0][168];
                const mapped = mapVideoToScreen(nose.x, nose.y);
                crosshair.targetX = mapped.x;
                crosshair.targetY = mapped.y;
                crosshair.active = true;
                crosshair.x = lerp(crosshair.x, crosshair.targetX, 0.4);
                crosshair.y = lerp(crosshair.y, crosshair.targetY, 0.4);
                crosshair.trail.push({x: crosshair.x, y: crosshair.y, life: 1.0});
                if(crosshair.trail.length > 10) crosshair.trail.shift();
                if (result.faceBlendshapes && result.faceBlendshapes[0]) {
                    const shapes = result.faceBlendshapes[0].categories;
                    const bL = shapes.find(s => s.categoryName === 'eyeBlinkLeft').score;
                    const bR = shapes.find(s => s.categoryName === 'eyeBlinkRight').score;
                    const blinkScore = (bL + bR) / 2;
                    document.getElementById('blink-progress').style.width = (blinkScore * 100) + "%";
                    if (blinkScore > gameState.sensitivity && now - gameState.lastBlink > 400) {
                        fire();
                        gameState.lastBlink = now;
                    }
                }
            } else {
                crosshair.active = false;
            }
        }
        if (gameState.mode === 'PLAYING') {
            gameState.time -= delta / 1000;
            if (gameState.time <= 0) endGame();
            if (target.active) {
                target.x += target.vx * delta;
                target.y += target.vy * delta;
                if (target.x < 0.1) { target.x = 0.1; target.vx *= -1; }
                if (target.x > 0.9) { target.x = 0.9; target.vx *= -1; }
                if (target.y < 0.2) { target.y = 0.2; target.vy *= -1; }
                if (target.y > 0.8) { target.y = 0.8; target.vy *= -1; }
            }
            document.getElementById('timer-text').innerText = Math.ceil(gameState.time);
            const offset = 219.9 * (1 - (gameState.time / gameState.maxTime));
            document.getElementById('timer-progress').style.strokeDashoffset = offset;
            gameState.displayScore = lerp(gameState.displayScore, gameState.score, 0.1);
            document.getElementById('score-text').innerText = Math.round(gameState.displayScore).toString().padStart(4, '0');
            const comboProgress = Math.min(100, (gameState.combo - 1) * 20);
            document.getElementById('combo-fill').style.width = comboProgress + "%";
            document.getElementById('critical-vignette').style.opacity = gameState.time < 5 ? '1' : '0';
        }
        render(now);
        requestAnimationFrame(gameLoop);
    }

    function render(now) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.width;
        const h = canvas.height;
        if (gameState.shake > 0) {
            ctx.save();
            ctx.translate((Math.random()-0.5)*gameState.shake, (Math.random()-0.5)*gameState.shake);
            gameState.shake *= 0.9;
        }
        crosshair.trail.forEach((p, i) => {
            p.life -= 0.05;
            ctx.strokeStyle = `rgba(0, 242, 255, ${i/10})`;
            ctx.beginPath();
            ctx.arc(p.x * w, p.y * h, 10 + (i*2), 0, Math.PI * 2);
            ctx.stroke();
        });
        if (target.active && gameState.mode === 'PLAYING') {
            const tx = target.x * w;
            const ty = target.y * h;
            const entryScale = Math.min(1, (now - target.spawnTime) / 300);
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(entryScale, entryScale);

            if (gameState.targetSkin === 'bird') {
                const flapPhase = (now / 150) % (Math.PI * 2);
                const wingYScale = Math.sin(flapPhase);
                
                // Back Wing (Upper)
                ctx.save();
                ctx.translate(2, -8);
                ctx.rotate(-0.3 + (-wingYScale * 0.5));
                ctx.fillStyle = "#FFA000";
                ctx.beginPath();
                ctx.ellipse(0, -10, 22, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Tail Feathers
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.moveTo(-25, 0);
                ctx.lineTo(-45, -15);
                ctx.lineTo(-45, 15);
                ctx.closePath();
                ctx.fill();

                // Body
                const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 30);
                grad.addColorStop(0, "#FFEA00");
                grad.addColorStop(1, "#FFC107");
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(0, 0, 32, 22, 0, 0, Math.PI * 2);
                ctx.fill();

                // Front Wing (Lower)
                ctx.save();
                ctx.translate(2, 8);
                ctx.rotate(0.3 + (wingYScale * 0.5));
                ctx.fillStyle = "#FFB300";
                ctx.beginPath();
                ctx.ellipse(0, 10, 24, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Head
                ctx.fillStyle = "#FFD54F";
                ctx.beginPath();
                ctx.arc(24, -8, 16, 0, Math.PI * 2);
                ctx.fill();

                // Eye
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(30, -12, 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(32, -12, 2, 0, Math.PI * 2); ctx.fill();

                // Beak
                ctx.fillStyle = "#FF3D00";
                ctx.beginPath();
                ctx.moveTo(38, -10);
                ctx.lineTo(50, -6);
                ctx.lineTo(38, 0);
                ctx.closePath();
                ctx.fill();
                
            } else {
                const pulse = Math.sin(now / 200) * 5;
                ctx.strokeStyle = COLORS.cyan;
                ctx.lineWidth = 4;
                ctx.setLineDash([15, 15]);
                ctx.beginPath();
                ctx.arc(0, 0, target.radius + pulse, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = COLORS.pink;
                ctx.shadowBlur = 20;
                ctx.shadowColor = COLORS.pink;
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            ctx.restore();
        }
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx / w;
            p.y += p.vy / h;
            p.life -= 0.02;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x * w, p.y * h, p.size, p.size);
        }
        for (let i = popups.length - 1; i >= 0; i--) {
            const p = popups[i];
            p.y += p.vy / h;
            p.life -= 0.01;
            if (p.life <= 0) { popups.splice(i, 1); continue; }
            ctx.font = `italic 900 ${24 * p.life + 10}px Russo One`;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.textAlign = 'center';
            ctx.fillText(p.text, p.x * w, p.y * h);
        }
        if (crosshair.active) {
            const cx = crosshair.x * w;
            const cy = crosshair.y * h;
            ctx.globalAlpha = 1;
            ctx.strokeStyle = COLORS.cyan;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, 30, 0, Math.PI * 2);
            ctx.moveTo(cx - 40, cy); ctx.lineTo(cx - 15, cy);
            ctx.moveTo(cx + 40, cy); ctx.lineTo(cx + 15, cy);
            ctx.moveTo(cx, cy - 40); ctx.lineTo(cx, cy - 15);
            ctx.moveTo(cx, cy + 40); ctx.lineTo(cx, cy + 15);
            ctx.stroke();
            ctx.fillStyle = COLORS.cyan;
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        if (gameState.shake > 0) ctx.restore();
        ctx.globalAlpha = 1;
    }

    document.querySelectorAll('#time-selector button, #arrow-selector button, #skin-selector button').forEach(btn => {
        btn.onclick = async () => {
            await Audio.click();
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active', 'neon-border-cyan'));
            btn.classList.add('active', 'neon-border-cyan');
        };
    });

    document.getElementById('start-btn').onclick = startSequence;
    document.getElementById('restart-btn').onclick = startSequence;
    document.getElementById('menu-btn').onclick = async () => {
        await Audio.click();
        document.getElementById('end-screen').classList.replace('visible', 'hidden');
        document.getElementById('start-screen').classList.replace('hidden', 'visible');
    };

    init();
</script>
</body>
</html>
